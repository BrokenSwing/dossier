name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:services

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
